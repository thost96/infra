---
name: Linter

on:
  workflow_dispatch:
  push:
  pull_request:
    branches: [main]

permissions:
  actions: none
  checks: none
  contents: read
  deployments: none
  issues: none
  packages: none
  pull-requests: read
  repository-projects: none
  security-events: none
  statuses: read

jobs:
  super-lint:
    name: Run Super Linter
    environment:
      name: staging
    permissions:
      contents: write
      statuses: write
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'renovate[bot]'
    runs-on: ubuntu-latest
    concurrency:
      group: super-lint-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: true
          ref: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref }}

      - name: Prettify code
        uses: creyD/prettier_action@8c18391fdc98ed0d884c6345f03975edac71b8f0
        continue-on-error: true
        with:
          prettier_options: --write **/*.{json,md,yaml,yml}
          github_token: ${{ secrets.GH_TOKEN }}
          only_changed: true

      - name: Install Ansible-Galaxy requirements
        run: |
          ansible-galaxy install -r ansible/requirements.yaml --ignore-errors --force

      - name: Run Super Linter
        uses: super-linter/super-linter/slim@487d0d80e66b54831132fe7b2095f9388a624462
        continue-on-error: true
        env:
          VALIDATE_ALL_CODEBASE: true
          FIX_SHELL_SHFMT: true
          FIX_ANSIBLE: true
          FIX_GITHUB_ACTIONS_ZIZMOR: true
          FIX_JSON_PRETTIER: true
          FIX_BIOME_FORMAT: true
          FIX_BIOME_LINT: true
          FIX_MARKDOWN_PRETTIER: true
          FIX_MARKDOWN: true
          FIX_TERRAFORM_FMT: true
          FILTER_REGEX_EXCLUDE: ^.*roles\/.*|^.*plugins\/.*|^.*packer\/.*
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit and push linting fixes
        # Run only on:
        # - Pull requests
        # - Not on the default branch
        if: >
          github.event_name == 'pull_request' &&
          github.ref_name != github.event.repository.default_branch
        uses: stefanzweifel/git-auto-commit-action@f53a62c26ed5971dd2ed8768e4142f08c767ea37
        with:
          branch: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref }}
          commit_message: "chore: fix linting issues"
          commit_user_name: super-linter
          commit_user_email: super-linter@super-linter.dev

  packer-validate:
    name: Validate Packer Templates
    environment:
      name: staging
    runs-on: ubuntu-latest
    concurrency:
      group: packer-validate-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: true
          ref: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@c3d53c525d422944e50ee27b840746d6522b08de
        with:
          version: "latest"

      - name: Validate Packer Templates
        continue-on-error: true # Skip failure to allow other jobs to complete
        run: |
          # Find all packer template files and validate them
          find ./packer -name "*.pkr.hcl" | while read -r template; do
            echo "Validating $template"
            packer init "$template"
            packer validate -syntax-only "$template"
          done
